name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Smoke test tmux flow
        run: npm run test:smoke

      - name: Package extension
        run: npm run vsix
