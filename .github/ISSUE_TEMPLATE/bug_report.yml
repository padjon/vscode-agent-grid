name: Bug report
description: Report a defect in Agent Grid
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before filing, run `Agent Grid: Run Environment Check` and `Agent Grid: Export Support Bundle`. Include the relevant output if the issue is related to setup, tmux detection, WSL, attach, restore, or repo-config migration behavior.
  - type: input
    id: vscode
    attributes:
      label: VS Code version
      placeholder: 1.99.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: Linux, macOS, or WSL
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Agent Grid diagnostics or support bundle
      placeholder: Paste the output from the "Agent Grid" output channel or the exported support bundle here.
